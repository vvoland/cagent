models:
  model:
    provider: anthropic
    model: claude-sonnet-4-0

mcps:
  test:
    ref: docker:test
    env:
      KEY: "from_definition"
      SHARED: "from_definition"

agents:
  root:
    model: model
    toolsets:
      - type: mcp
        ref: test
        env:
          KEY: "from_toolset"
          EXTRA: "from_toolset"
